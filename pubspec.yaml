name: medrep_pro
description: MedRep Pro - Enterprise Pharmaceutical Sales Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.2.3

  # Backend / Database
  supabase_flutter: ^2.5.6
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^7.1.1
  internet_connection_checker_plus: ^3.0.0

  # Local Storage
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.2.3

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  uuid: ^4.4.0
  intl: ^0.20.2
  logger: ^2.3.0
  rxdart: ^0.28.0

  # Notifications
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

  # UI Utilities
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^1.2.0
  flutter_screenutil: ^5.9.3

  # Crypto / Security
  crypto: ^3.0.3
  encrypt: ^5.0.3
  local_auth: ^2.3.0

  # Clerk Auth
  clerk_flutter: 0.0.15-beta
  clerk_auth: 0.0.15-beta

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  freezed: ^3.2.5
  mockito: ^5.4.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

hooks:
  user_defines:
    sqlite3:
      source: system
